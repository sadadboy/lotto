version: '3.8'

services:
  lotto-bot:
    build: .
    container_name: lotto-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # 사용자가 직접 준비/업로드하는 비밀 파일만 호스트에서 마운트한다.
      # (git에는 올리지 않음 — .gitignore 처리)
      # 주의: 개별 파일 마운트는 호스트에 해당 "파일"이 먼저 존재해야 한다.
      #       (없으면 Docker가 같은 이름의 빈 디렉토리를 만들어 오작동함)
      - ./config.json:/app/config.json
      - ./secret.key:/app/secret.key
      # status.json / bot.log 등 런타임 생성 파일은 마운트하지 않는다.
      # 컨테이너 내부에서 앱이 자동 생성하며, 봇 시작 시 예치금이 갱신된다.
      # 로그는 `docker compose logs` 또는 대시보드에서 확인.
    environment:
      - TZ=Asia/Seoul
      - HEADLESS=true
      # Add any other environment variables here if needed
    stdin_open: true # docker run -i
    tty: true        # docker run -t
